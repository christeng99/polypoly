name: Rust CI/CD with Docker and GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: rust-lang/setup-rust@v1
      with:
        rust-version: 1.94.1  # Make sure to use your desired Rust version

    - name: Build the application
      run: |
        cargo build --release

    - name: Build Docker image
      run: |
        docker build -t ghcr.io/${{ github.actor }}/my-rust-app:latest .

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Push Docker image to GHCR
      run: |
        docker push ghcr.io/${{ github.actor }}/my-rust-app:latest
